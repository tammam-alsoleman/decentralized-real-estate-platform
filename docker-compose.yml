services:
  postgres:
    image: postgres:16-alpine
    container_name: realestate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: realestate_user
      POSTGRES_PASSWORD: realestate_password
      POSTGRES_DB: realestate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - realestate-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: realestate-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: realestate_user
      RABBITMQ_DEFAULT_PASS: realestate_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - realestate-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  realestate-network:
    driver: bridge