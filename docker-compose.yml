services:
  postgres:
    image: postgres:16-alpine
    container_name: realestate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: realestate_user
      POSTGRES_PASSWORD: realestate_password
      POSTGRES_DB: realestate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - realestate-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: realestate-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: realestate_user
      RABBITMQ_DEFAULT_PASS: realestate_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - realestate-network

  auth-service:
    container_name: realestate-auth-service
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    ports:
      - "50051:50051"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL:-postgresql://realestate_user:realestate_password@postgres:5432/realestate_db?schema=auth_schema}
      AUTH_GRPC_URL: ${AUTH_GRPC_URL:-0.0.0.0:50051}
      AUTH_JWT_ACCESS_TOKEN_SECRET: ${AUTH_JWT_ACCESS_TOKEN_SECRET:-development-only-auth-jwt-secret-change-me}
      AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-decentralized-real-estate-auth}
      AUTH_RETURN_OTP_IN_RESPONSE: ${AUTH_RETURN_OTP_IN_RESPONSE:-false}
      EMAIL_OTP_DELIVERY_PROVIDER: ${EMAIL_OTP_DELIVERY_PROVIDER:-development}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Real Estate Platform <onboarding@resend.dev>}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      LEGAL_IDENTITY_ENCRYPTION_KEY: ${LEGAL_IDENTITY_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    networks:
      - realestate-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  realestate-network:
    driver: bridge
