name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  foundation-checks:
    name: Foundation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required root files
        run: |
          test -f README.md
          test -f .gitignore
          test -f .env.example
          test -f docker-compose.yml

      - name: Check required directories
        run: |
          test -d apps
          test -d services
          test -d packages
          test -d infrastructure
          test -d docs

      - name: Validate Docker Compose file
        run: docker compose config

  auth-service-build:
    name: Auth Service Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Auth Service dependencies
        working-directory: services/auth-service
        run: npm ci

      - name: Build Auth Service
        working-directory: services/auth-service
        run: npm run build