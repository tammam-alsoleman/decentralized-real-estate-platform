name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  foundation-checks:
    name: Foundation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required root files
        run: |
          test -f README.md
          test -f .gitignore
          test -f .env.example
          test -f docker-compose.yml

      - name: Check required directories
        run: |
          test -d apps
          test -d services
          test -d packages
          test -d infrastructure
          test -d docs

      - name: Validate Docker Compose file
        run: docker compose config