name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  foundation-checks:
    name: Foundation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required root files
        run: |
          test -f README.md
          test -f .gitignore
          test -f .env.example
          test -f docker-compose.yml

      - name: Check required directories
        run: |
          test -d apps
          test -d services
          test -d packages
          test -d infrastructure
          test -d docs

      - name: Validate Docker Compose file
        run: docker compose config

  auth-service-build:
    name: Auth Service Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Auth Service dependencies
        working-directory: services/auth-service
        run: npm ci

      - name: Validate Auth Service Prisma schema
        working-directory: services/auth-service
        env:
          DATABASE_URL: postgresql://realestate_user:realestate_password@localhost:5432/realestate_db?schema=auth_schema
        run: npm run prisma:validate

      - name: Build Auth Service
        working-directory: services/auth-service
        run: npm run build

  blockchain-service-build:
    name: Blockchain Service Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/blockchain-service/package-lock.json

      - name: Install Blockchain Service dependencies
        working-directory: services/blockchain-service
        run: npm ci

      - name: Test Blockchain Service
        working-directory: services/blockchain-service
        run: npm test

      - name: Build Blockchain Service
        working-directory: services/blockchain-service
        run: npm run build
