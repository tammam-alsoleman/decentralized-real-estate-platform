syntax = "proto3";

package realestate.auth.v1;

service AuthService {
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc ResendEmailVerificationOtp(ResendEmailVerificationOtpRequest) returns (ResendEmailVerificationOtpResponse);
  rpc RequestLoginOtp(RequestLoginOtpRequest) returns (RequestLoginOtpResponse);
  rpc CompleteLoginOtp(CompleteLoginOtpRequest) returns (CompleteLoginOtpResponse);
  rpc RefreshAuthSession(RefreshAuthSessionRequest) returns (RefreshAuthSessionResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ValidateAccessToken(ValidateAccessTokenRequest) returns (ValidateAccessTokenResponse);
  rpc CompletePhoneVerification(CompletePhoneVerificationRequest) returns (CompletePhoneVerificationResponse);
  rpc CompleteEmailVerification(CompleteEmailVerificationRequest) returns (CompleteEmailVerificationResponse);
  rpc GetLegalIdentityProfile(GetLegalIdentityProfileRequest) returns (GetLegalIdentityProfileResponse);
  rpc SubmitLegalIdentityProfile(SubmitLegalIdentityProfileRequest) returns (SubmitLegalIdentityProfileResponse);
  rpc GetLegalIdentityForTransaction(GetLegalIdentityForTransactionRequest) returns (GetLegalIdentityForTransactionResponse);
}

message RegisterUserRequest {
  string phone_number = 1;
  optional string password_hash = 2;
  string email = 3;
}

message RegisterUserResponse {
  string user_id = 1;
  string phone_number = 2;
  string status = 3;
  string otp_plain_code = 4;
  string email = 5;
}

message ResendEmailVerificationOtpRequest {
  string email = 1;
}

message ResendEmailVerificationOtpResponse {
  bool sent = 1;
  string user_id = 2;
  string email = 3;
  string otp_plain_code = 4;
  string expires_at = 5;
}

message RequestLoginOtpRequest {
  string email = 1;
}

message RequestLoginOtpResponse {
  bool sent = 1;
  string user_id = 2;
  string email = 3;
  string otp_plain_code = 4;
  string expires_at = 5;
}

message CompleteLoginOtpRequest {
  string email = 1;
  string otp_plain_code = 2;
}

message CompleteLoginOtpResponse {
  bool authenticated = 1;
  string user_id = 2;
  string email = 3;
  string status = 4;
  bool requires_legal_identity = 5;
  string access_token = 6;
  string refresh_token = 7;
  string access_token_expires_at = 8;
  string refresh_token_expires_at = 9;
}

message RefreshAuthSessionRequest {
  string refresh_token = 1;
}

message RefreshAuthSessionResponse {
  bool refreshed = 1;
  string user_id = 2;
  string email = 3;
  string access_token = 4;
  string refresh_token = 5;
  string access_token_expires_at = 6;
  string refresh_token_expires_at = 7;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool logged_out = 1;
}

message ValidateAccessTokenRequest {
  string access_token = 1;
}

message ValidateAccessTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string role = 4;
  string status = 5;
  string session_id = 6;
}

message CompletePhoneVerificationRequest {
  string user_id = 1;
  string phone_number = 2;
  string otp_plain_code = 3;
}

message CompleteEmailVerificationRequest {
  string user_id = 1;
  string email = 2;
  string otp_plain_code = 3;
}

message CompletePhoneVerificationResponse {
  bool verified = 1;
  string user_id = 2;
  string status = 3;
  bool requires_legal_identity = 4;
}

message CompleteEmailVerificationResponse {
  bool verified = 1;
  string user_id = 2;
  string status = 3;
  bool requires_legal_identity = 4;
  string access_token = 5;
  string refresh_token = 6;
  string access_token_expires_at = 7;
  string refresh_token_expires_at = 8;
}

message GetLegalIdentityProfileRequest {
  string user_id = 1;
}

message GetLegalIdentityProfileResponse {
  bool exists = 1;
  string user_id = 2;
  string legal_full_name = 3;
  string status = 4;
  optional string date_of_birth = 5;
  optional string legal_address = 6;
}

message SubmitLegalIdentityProfileRequest {
  string user_id = 1;
  string legal_full_name = 2;
  string national_id = 3;
  optional string date_of_birth = 4;
  optional string legal_address = 5;
}

message SubmitLegalIdentityProfileResponse {
  string user_id = 1;
  string legal_full_name = 2;
  string status = 3;
  optional string legal_address = 4;
}

message GetLegalIdentityForTransactionRequest {
  string user_id = 1;
}

message GetLegalIdentityForTransactionResponse {
  bool exists = 1;
  bool eligible_for_transaction = 2;
  string user_id = 3;
  string legal_full_name = 4;
  string national_id = 5;
  optional string date_of_birth = 6;
  optional string legal_address = 7;
  string status = 8;
}
