networks:
  realestate_fabric:
    external: true
    name: realestate_fabric

services:
  orderer.realestate.local:
    container_name: orderer.realestate.local
    image: hyperledger/fabric-orderer:2.5.16
    command: orderer
    ports:
      - "17050:7050"
      - "17053:7053"
      - "19443:9443"
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
    volumes:
      - ../organizations/ordererOrganizations/realestate.local/orderers/orderer.realestate.local/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/realestate.local/orderers/orderer.realestate.local/tls:/var/hyperledger/orderer/tls
      - ../production/orderer.realestate.local:/var/hyperledger/production/orderer
    networks:
      - realestate_fabric

  peer0.registry.realestate.local:
    container_name: peer0.registry.realestate.local
    image: hyperledger/fabric-peer:2.5.16
    command: peer node start
    ports:
      - "17051:7051"
      - "19444:9444"
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.registry.realestate.local
      - CORE_PEER_ADDRESS=peer0.registry.realestate.local:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.registry.realestate.local:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registry.realestate.local:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.registry.realestate.local:7051
      - CORE_PEER_LOCALMSPID=RegistryMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=realestate_fabric
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
    volumes:
      - ../organizations/peerOrganizations/registry.realestate.local/peers/peer0.registry.realestate.local/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/registry.realestate.local/peers/peer0.registry.realestate.local/tls:/etc/hyperledger/fabric/tls
      - ../production/peer0.registry.realestate.local:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    networks:
      - realestate_fabric

  peer0.notary.realestate.local:
    container_name: peer0.notary.realestate.local
    image: hyperledger/fabric-peer:2.5.16
    command: peer node start
    ports:
      - "8051:8051"
      - "9445:9445"
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.notary.realestate.local
      - CORE_PEER_ADDRESS=peer0.notary.realestate.local:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.notary.realestate.local:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.notary.realestate.local:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.notary.realestate.local:8051
      - CORE_PEER_LOCALMSPID=NotaryMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=realestate_fabric
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9445
    volumes:
      - ../organizations/peerOrganizations/notary.realestate.local/peers/peer0.notary.realestate.local/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/notary.realestate.local/peers/peer0.notary.realestate.local/tls:/etc/hyperledger/fabric/tls
      - ../production/peer0.notary.realestate.local:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    networks:
      - realestate_fabric

  peer0.platform.realestate.local:
    container_name: peer0.platform.realestate.local
    image: hyperledger/fabric-peer:2.5.16
    command: peer node start
    ports:
      - "9051:9051"
      - "9446:9446"
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.platform.realestate.local
      - CORE_PEER_ADDRESS=peer0.platform.realestate.local:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.platform.realestate.local:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.platform.realestate.local:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.platform.realestate.local:9051
      - CORE_PEER_LOCALMSPID=PlatformMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=realestate_fabric
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9446
    volumes:
      - ../organizations/peerOrganizations/platform.realestate.local/peers/peer0.platform.realestate.local/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/platform.realestate.local/peers/peer0.platform.realestate.local/tls:/etc/hyperledger/fabric/tls
      - ../production/peer0.platform.realestate.local:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    networks:
      - realestate_fabric
