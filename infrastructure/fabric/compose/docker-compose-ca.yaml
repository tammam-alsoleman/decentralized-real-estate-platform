
networks:
  realestate_fabric:
    name: realestate_fabric

services:
  ca.registry.realestate.local:
    image: hyperledger/fabric-ca:1.5.17
    container_name: ca.registry.realestate.local
    hostname: ca.registry.realestate.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-registry
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.registry.realestate.local,localhost
    ports:
      - "7054:7054"
    command: sh -c "fabric-ca-server start -b admin:adminpw -d"
    volumes:
      - ../organizations/fabric-ca/registry:/etc/hyperledger/fabric-ca-server
    networks:
      - realestate_fabric

  ca.notary.realestate.local:
    image: hyperledger/fabric-ca:1.5.17
    container_name: ca.notary.realestate.local
    hostname: ca.notary.realestate.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-notary
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.notary.realestate.local,localhost
    ports:
      - "8054:8054"
    command: sh -c "fabric-ca-server start -b admin:adminpw -d"
    volumes:
      - ../organizations/fabric-ca/notary:/etc/hyperledger/fabric-ca-server
    networks:
      - realestate_fabric

  ca.platform.realestate.local:
    image: hyperledger/fabric-ca:1.5.17
    container_name: ca.platform.realestate.local
    hostname: ca.platform.realestate.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-platform
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.platform.realestate.local,localhost
    ports:
      - "9054:9054"
    command: sh -c "fabric-ca-server start -b admin:adminpw -d"
    volumes:
      - ../organizations/fabric-ca/platform:/etc/hyperledger/fabric-ca-server
    networks:
      - realestate_fabric

  ca.orderer.realestate.local:
    image: hyperledger/fabric-ca:1.5.17
    container_name: ca.orderer.realestate.local
    hostname: ca.orderer.realestate.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.orderer.realestate.local,localhost
    ports:
      - "10054:10054"
    command: sh -c "fabric-ca-server start -b admin:adminpw -d"
    volumes:
      - ../organizations/fabric-ca/orderer:/etc/hyperledger/fabric-ca-server
    networks:
      - realestate_fabric
